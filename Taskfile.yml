---
version: '3'

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ

tasks:
  default:
    desc: List available tasks
    cmds:
      - task -l
    silent: true

  build:
    desc: Build summarize binary
    cmds:
      - |
        go build \
          -ldflags "-s -w \
            -X main.version={{.VERSION}} \
            -X main.commit={{.COMMIT}} \
            -X main.date={{.DATE}}" \
          -o summarize \
          ./cmd/server
    env:
      CGO_ENABLED: "0"

  test:
    desc: Run tests
    cmds:
      - go test ./...

  lint:
    desc: Run go vet
    cmds:
      - go vet ./...

  snapshot:
    desc: Build snapshot with goreleaser
    cmds:
      - goreleaser build --clean --snapshot

  release:
    desc: Create release with goreleaser (CI only)
    cmds:
      - goreleaser release --clean

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f summarize
      - rm -rf dist/
